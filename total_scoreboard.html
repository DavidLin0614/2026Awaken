<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營會總成績排行榜</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .total-container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .score-card { 
            background: rgba(15, 20, 30, 0.9); border: 2px solid #f39c12; 
            padding: 20px; border-radius: 15px; text-align: center;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .score-card h2 { margin: 0; color: #fff; font-size: 1.5em; }
        .score-card .points { font-size: 3em; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .score-card .detail { font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <h1 style="text-align:center; font-size:3em; margin-top:20px;">🏆 2026 營會總積分排行 🏆</h1>
    <div class="total-container">
        <div class="score-grid" id="totalScoreBoard">
            <!-- 1-15隊的總分卡片會自動生成 -->
        </div>
    </div>
    <script type="module" src="total_score.js"></script>
</body>
</html>
