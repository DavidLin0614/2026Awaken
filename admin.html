<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關主專用後台</title>
    <style>
        body { font-family: "微軟正黑體", sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; display: block; }
        h1 { color: #333; margin-top: 0; }
        .station-badge { color: white; padding: 5px 15px; border-radius: 20px; font-size: 1.2em; font-weight: bold; display: inline-block; margin-bottom: 10px; background-color: #ff5722; }
        
        /* 關卡狀態燈號 */
        .status-btn { width: 100%; padding: 10px; border: none; border-radius: 5px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .status-green { background-color: #2ecc71; color: white; }
        .status-red { background-color: #e74c3c; color: white; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        select, input { width: 100%; padding: 12px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .time-inputs { display: flex; gap: 10px; }
        
        /* 給讚 UI */
        .like-box { background: #e8f8f5; border: 2px dashed #1abc9c; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .like-box span { font-weight: bold; color: #16a085; }
        .like-controls button { background: #1abc9c; color: white; border: none; padding: 5px 15px; font-size: 1.2em; border-radius: 5px; cursor: pointer; }

        button.submit { background-color: #4CAF50; color: white; border: none; padding: 15px; width: 100%; font-size: 1.2em; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .record-item { display: flex; justify-content: space-between; background: #eee; padding: 10px; margin-bottom: 8px; border-radius: 5px; align-items: center; text-align: left; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; width: auto; margin: 0; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="station-badge" id="stationDisplay">正在載入關卡...</div>
        
        <!-- 🟢/🔴 關卡狀態切換 -->
        <button id="statusToggleBtn" class="status-btn status-green">🟢 目前為空關 (點擊切換為有人)</button>
        
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ccc;">

        <div class="form-group"><label>選擇闖關隊伍：</label><select id="teamSelect"></select></div>

        <div class="form-group" id="timeInputGroup">
            <label>花費時間：</label>
            <div class="time-inputs"><input type="number" id="minInput" placeholder="分" min="0"><input type="number" id="secInput" placeholder="秒" min="0" max="59"></div>
        </div>

        <div class="form-group" id="scoreInputGroup" style="display: none;">
            <label id="scoreLabel">獲得分數：</label><input type="number" id="scoreInput" placeholder="請輸入數值" min="0">
        </div>

        <!-- 給讚系統 -->
        <div class="like-box">
            <span>👍 給予表現讚賞：</span>
            <div class="like-controls">
                <button id="btnMinusLike">-</button>
                <b id="likeCount" style="margin: 0 10px; font-size: 1.2em; color: #e67e22;">0</b>
                <button id="btnPlusLike">+</button>
            </div>
        </div>

        <button id="submitBtn" class="submit">送出成績與讚賞 🚀</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
        <h3 style="margin-top: 0;">本關目前紀錄 🏆</h3>
        <div id="stationLeaderboard"><p style="color: #888;">目前尚無成績</p></div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
