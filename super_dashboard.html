<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 營會全能總控台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 15px; background: rgba(255,255,255,0.1); border: none; color: #aaa; cursor: pointer; font-size: 1.1em; font-weight: bold; }
        .tab-btn.active { background: #f39c12; color: white; border-top: 3px solid white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .control-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; }
        .monitor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    </style>
</head>
<body>
    <h1>👑 營會全能總控台</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('d2-panel')">🏃 D2 自由闖關控台</button>
        <button class="tab-btn" onclick="openTab('d3-panel')">⚔️ D3 PK對抗控台</button>
        <button class="tab-btn" onclick="openTab('score-panel')">🏆 總積分管理</button>
    </div>

    <!-- 分頁 A：D2 總控台 -->
    <div id="d2-panel" class="tab-content active">
        <div class="control-bar">
            <button class="btn btn-setting" id="d2_setBtn">⚙️ D2 參數設定</button>
            <button class="btn btn-base" id="d2_addBtn">➕ 新增 D2 資料</button>
            <button class="btn btn-toggle" id="d2_lockBtn">🔒 關閉 D2 輸入</button>
            <button class="btn btn-score" id="d2_hideBtn">🙈 隱藏 D2 展示</button>
            <button class="btn btn-danger" id="d2_clearBtn">💣 一鍵清空 D2</button>
        </div>
        <div class="monitor-grid" id="d2_monitor"></div>
    </div>

    <!-- 分頁 B：D3 總控台 -->
    <div id="d3-panel" class="tab-content">
        <div class="control-bar">
            <button class="btn btn-setting" id="d3_setBtn">⚙️ D3 參數設定</button>
            <button class="btn btn-base" id="d3_addBtn">➕ 新增 D3 資料</button>
            <button class="btn btn-setting" id="d3_scheduleBtn">📅 匯入賽程表</button>
            <button class="btn btn-toggle" id="d3_lockBtn">🔒 關閉 D3 輸入</button>
            <button class="btn btn-score" id="d3_hideBtn">🙈 隱藏 D3 展示</button>
            <button class="btn btn-danger" id="d3_clearBtn">💣 一鍵清空 D3</button>
        </div>
        <div class="monitor-grid" id="d3_monitor"></div>
    </div>

    <!-- 分頁 C：總分控台 -->
    <div id="score-panel" class="tab-content">
        <div class="control-bar">
            <button class="btn btn-setting" id="score_setBtn">👥 設定總隊伍數</button>
            <button class="btn btn-base" id="score_addBtn">➕ 新增額外加分</button>
            <button class="btn btn-score" onclick="window.location.href='total_scoreboard.html'">📊 前往總分展示頁</button>
        </div>
        <div class="glass-card" style="padding: 20px;">
            <h3>📊 目前各隊即時總分</h3>
            <div id="score_summary" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:10px;"></div>
        </div>
    </div>

    <!-- Modal 區域 (參數設定等) -->
    <div class="modal-overlay" id="globalModal">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <script type="module" src="super_dashboard.js"></script>
    <script>
        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
