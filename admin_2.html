<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK 戰績輸入</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: "微軟正黑體", sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .vs-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; }
        .vs-text { font-size: 2em; font-weight: bold; color: #e74c3c; }
        .station-badge { background-color: #e74c3c; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .round-ctrl { background: #f1f2f6; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        select { padding: 10px; font-size: 1em; border-radius: 5px; border: 1px solid #ccc; width: 100%; }
        .like-btn-sq { width: 45px; height: 45px; background: #f1c40f; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; }
        .submit-btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; font-size: 1.2em; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="station-badge" id="stationDisplay">載入中...</div>
        
        <div class="round-ctrl">
            <button onclick="changeRound(-1)">◀</button>
            <b id="roundText">第 1 輪</b>
            <button onclick="changeRound(1)">▶</button>
        </div>

        <div class="vs-box">
            <div style="flex:1;">
                <select id="teamASelect"></select>
                <button class="like-btn-sq" id="likeA">👍<br><small id="lA">0</small></button>
            </div>
            <div class="vs-text">VS</div>
            <div style="flex:1;">
                <select id="teamBSelect"></select>
                <button class="like-btn-sq" id="likeB">👍<br><small id="lB">0</small></button>
            </div>
        </div>

        <div style="background:#ffeaa7; padding:10px; border-radius:8px;">
            <label>🏆 誰贏了？</label>
            <select id="winnerSelect"></select>
        </div>

        <button class="submit-btn" id="submitBtn">送出對戰戰績 🚀</button>

        <hr>
        <div id="stationLeaderboard"></div>
    </div>
    <script type="module" src="admin_2.js"></script>
</body>
</html>
