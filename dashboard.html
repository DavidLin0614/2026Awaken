<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營會總控台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-container { max-width: 1600px !important; }
        
        .control-panel { 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; margin: 0 auto 20px auto; 
            width: 100%; max-width: 1600px; display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; 
        }
        .btn { 
            flex: 1 1 12%; padding: 12px 5px; font-size: 1em; border-radius: 5px; cursor: pointer; 
            border: none; font-weight: bold; transition: 0.2s; white-space: pre-line; line-height: 1.4; 
        }
        .btn:hover { filter: brightness(1.2); }
        .btn-score { background: #f39c12; color: white; }
        .btn-export { background: #27ae60; color: white; }
        .btn-toggle { background: #e74c3c; color: white; }
        .btn-toggle-screen { background: #8e44ad; color: white; }
        .btn-setting { background: #3498db; color: white; }
        .btn-add { background: #1abc9c; color: white; } /* 🌟 新增按鈕的專屬顏色 */
        .btn-danger { background: #c0392b; color: white; }
        
        .record-list { list-style: none; padding: 0; margin: 0; font-size: 0.9em; text-align: left; }
        .record-list li { background: rgba(255,255,255,0.1); margin-bottom: 8px; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .record-info { line-height: 1.4; }
        .timestamp { font-size: 0.8em; color: #aaa; }
        
        .action-btns button { border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; }
        .edit-btn { background: #3498db; margin-right: 5px; }
        .del-btn { background: #ff4d4d; }

        @media (max-width: 768px) { .btn { flex: 1 1 45%; font-size: 0.9em; } #dashboardBoard { grid-template-columns: 1fr !important; } }
        
        /* Modal 裡的排版微調 */
        .time-inputs { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <!-- 🌟 更新為你要的標題 -->
    <h1 style="margin-bottom: 10px;">👑 總控台 👑</h1>
    
    <div class="control-panel">
        <button class="btn btn-score" id="calcScoreBtn">🏆 結算總成績</button>
        <button class="btn btn-export" id="exportBtn">📊 匯出資料 (CSV)</button>
        <button class="btn btn-setting" id="openSettingsBtn">⚙️ 系統參數設定</button>
        <button class="btn btn-add" id="openAddRecordBtn">➕ 新增資料</button>
        <button class="btn btn-toggle" id="lockSystemBtn">🔒 關閉輸入<br>(讀取中)</button>
        <button class="btn btn-toggle-screen" id="hideScreenBtn">🙈 隱藏大螢幕<br>(讀取中)</button>
        <button class="btn btn-danger" id="clearAllBtn">💣 一鍵清空</button>
    </div>

    <div class="grid-container" id="dashboardBoard"></div>

    <!-- ⚙️ 系統參數設定 Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ 系統參數設定面板</h2>
            <div class="form-row">
                <div class="form-group"><label>🔒 關主登入密碼</label><input type="text" id="set_pwd" placeholder="例如: 2026"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>👥 總隊伍數</label><input type="number" id="set_teams" min="1"></div>
                <div class="form-group"><label>🚩 總關卡數</label><input type="number" id="set_stations" min="1"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>⏱️ 最大分鐘 (時間防呆)</label><input type="number" id="set_maxMin" placeholder="預設 59"></div>
                <div class="form-group"><label>🎯 最大分數 (計分防呆)</label><input type="number" id="set_maxScore" placeholder="預設 999"></div>
            </div>
            <hr style="border:1px solid #7f8c8d; margin:15px 0;">
            <h3 style="margin-top:0; color:#ffd700;">🏆 總積分規則設定</h3>
            <div class="form-row">
                <div class="form-group"><label>第 1 名</label><input type="number" id="set_s1"></div>
                <div class="form-group"><label>第 2 名</label><input type="number" id="set_s2"></div>
                <div class="form-group"><label>第 3 名</label><input type="number" id="set_s3"></div>
                <div class="form-group"><label>基本分</label><input type="number" id="set_sBase"></div>
            </div>
            <hr style="border:1px solid #7f8c8d; margin:15px 0;">
            <h3 style="margin-top:0; color:#ffd700;">🎛️ 各關卡屬性設定 (計時/計分)</h3>
            <div id="stationConfigsContainer"></div>
            <div class="modal-btns">
                <button class="btn btn-export" style="flex:1;" id="saveSettingsBtn">💾 儲存並套用</button>
                <button class="btn btn-danger" style="flex:1;" id="closeSettingsBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- ➕ 手動新增資料 Modal -->
    <div class="modal-overlay" id="addRecordModal">
        <div class="modal-content">
            <h2>➕ 手動新增成績</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>🚩 選擇關卡</label>
                    <select id="add_station"></select>
                </div>
                <div class="form-group">
                    <label>👥 選擇隊伍</label>
                    <select id="add_team"></select>
                </div>
            </div>
            
            <!-- ⏱️ 計時模式 -->
            <div class="form-group" id="add_timeGroup">
                <label>⏱️ 花費時間</label>
                <div class="time-inputs">
                    <input type="number" id="add_min" placeholder="分" min="0">
                    <input type="number" id="add_sec" placeholder="秒" min="0" max="59">
                </div>
            </div>

            <!-- 🎯 計分模式 -->
            <div class="form-group" id="add_scoreGroup" style="display: none;">
                <label id="add_scoreLabel">🎯 獲得數值</label>
                <input type="number" id="add_score" placeholder="請輸入數值" min="0">
            </div>

            <div class="modal-btns">
                <button class="btn btn-add" style="flex:1;" id="saveNewRecordBtn">🚀 確認新增</button>
                <button class="btn btn-danger" style="flex:1;" id="closeAddRecordBtn">取消</button>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
