<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 總控台 (純PK勝負制)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-container { max-width: 1600px !important; display: block; }
        .control-panel { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; margin: 0 auto 20px auto; width: 100%; max-width: 1600px; display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; }
        .btn { flex: 1 1 12%; padding: 12px 5px; font-size: 1em; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; white-space: pre-line; line-height: 1.4; }
        .btn:hover { filter: brightness(1.2); }
        .btn-score { background: #f39c12; color: white; }
        .btn-export { background: #27ae60; color: white; }
        .btn-setting { background: #3498db; color: white; }
        .btn-base { background: #9b59b6; color: white; } 
        .btn-add { background: #1abc9c; color: white; } 
        .btn-toggle { background: #e74c3c; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-schedule { background: #e67e22; color: white; }
        
        .record-list { list-style: none; padding: 0; margin: 0; font-size: 0.9em; text-align: left; }
        .record-list li { background: rgba(255,255,255,0.1); margin-bottom: 8px; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #e74c3c; }
        .action-btns button { border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; background: #ff4d4d; }

        .dashboard-card { margin-bottom: 15px; width: 100%; height: auto !important; max-height: 300px;}
        textarea { width: 100%; height: 150px; padding: 10px; font-size: 1.1em; font-family: monospace; }
        @media (max-width: 768px) { .btn { flex: 1 1 45%; font-size: 0.9em; } }
    </style>
</head>
<body>
    <h1 style="margin-bottom: 10px;">⚔️ 總控台 (純 PK 勝負制) ⚔️</h1>
    
    <div class="control-panel">
        <button class="btn btn-score" id="calcScoreBtn">🏆 結算最終成績</button>
        <button class="btn btn-export" id="exportBtn">📊 匯出資料(CSV)</button>
        <button class="btn btn-schedule" id="openScheduleBtn">📅 匯入 Excel 賽程表</button>
        <button class="btn btn-setting" id="openSettingsBtn">⚙️ 基礎與按讚設定</button>
        <button class="btn btn-base" id="openRankScoresBtn">🏆 設定名次給分</button>
        <button class="btn btn-add" id="openAddRecordBtn">➕ 手動新增戰績</button>
        <button class="btn btn-toggle" id="lockSystemBtn">🔒 關閉輸入<br>(讀取中)</button>
        <button class="btn btn-danger" id="clearAllBtn">💣 一鍵清空</button>
        <button class="btn btn-base" id="openTeamScoresBtn">📝 各隊起始總分</button>
        <button class="btn btn-toggle-screen" id="hideScreenBtn" style="background: #8e44ad; color: white;">🙈 隱藏大螢幕<br>(讀取中)</button>
    </div>

    <!-- 在原有的 control-panel 下方加上這個新的控制條 -->
    <div class="control-panel" style="justify-content: center; align-items: center; margin-top: -10px; background: rgba(0,0,0,0.6);">
        <button class="btn btn-setting" id="prevRoundBtn" style="flex: 0 1 120px;">◀ 上一輪</button>
        <h2 id="globalRoundDisplay" style="margin: 0 20px; color: #f1c40f; text-shadow: 1px 1px 2px #000;">📅 目前：第 1 輪</h2>
        <button class="btn btn-setting" id="nextRoundBtn" style="flex: 0 1 120px;">下一輪 ▶</button>
    </div>

    <div class="grid-container" id="dashboardBoard" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;"></div>

    <!-- 📅 匯入賽程表 Modal -->
    <div class="modal-overlay" id="scheduleModal">
        <div class="modal-content">
            <h2>📅 匯入 Excel 賽程表</h2>
            <p style="color:#aaa; font-size:0.9em; line-height: 1.4;">
                <b style="color:#f1c40f;">支援直接從 Excel 複製貼上！</b><br>
                格式：每輪佔兩列，第一列是「第X輪」開頭接著隊伍A，第二列是隊伍B。<br>
                (只要全是數字，系統會自動幫你加上「第X隊」)
            </p>
            <textarea id="scheduleInput" placeholder="直接從 Excel 貼上你的排班表..."></textarea>
            <div class="modal-btns">
                <button class="btn btn-add" style="flex:1;" id="saveScheduleBtn">💾 解析並儲存賽程</button>
                <button class="btn btn-danger" style="flex:1;" id="closeScheduleBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- 🏆 設定名次給分 Modal -->
    <div class="modal-overlay" id="rankScoresModal">
        <div class="modal-content">
            <h2>🏆 設定名次對應給分</h2>
            <p style="color:#aaa; font-size:0.9em;">(營會結束後，會依據勝率排名，給予各隊以下設定的分數)</p>
            <div id="rankScoresContainer" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
            <div class="modal-btns">
                <button class="btn btn-score" style="flex:1;" id="saveRankScoresBtn">💾 儲存給分規則</button>
                <button class="btn btn-danger" style="flex:1;" id="closeRankScoresBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- ⚙️ 系統參數設定 Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ 基礎與按讚設定</h2>
            <div class="form-row">
                <div class="form-group"><label>👥 總隊伍數</label><input type="number" id="set_teams" min="1"></div>
                <div class="form-group"><label>🚩 總關卡數</label><input type="number" id="set_stations" min="1"></div>
            </div>
            <hr style="border:1px dashed #7f8c8d; margin:15px 0;">
            <div class="form-row">
                <div class="form-group"><label>👍 每關/每輪 可給讚數</label><input type="number" id="set_maxLikes" min="0" value="3"></div>
                <div class="form-group"><label>🪙 一個讚加多少總分</label><input type="number" id="set_likePoints" min="0" value="10"></div>
            </div>
            <div class="modal-btns">
                <button class="btn btn-export" style="flex:1;" id="saveSettingsBtn">💾 儲存</button>
                <button class="btn btn-danger" style="flex:1;" id="closeSettingsBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- ➕ 手動新增成績 Modal -->
    <div class="modal-overlay" id="addRecordModal">
        <div class="modal-content">
            <h2>➕ 手動補登戰績</h2>
            <div class="form-group"><label>🚩 選擇關卡</label><select id="add_station"></select></div>
            <div class="form-row">
                <div class="form-group"><label>👥 隊伍 A</label><select id="add_teamA"></select></div>
                <div class="form-group"><label>👥 隊伍 B</label><select id="add_teamB"></select></div>
            </div>
            <div class="form-group">
                <label style="color:#e74c3c;">🏆 哪一隊獲勝？</label>
                <select id="add_winner"></select>
            </div>
            <div class="modal-btns">
                <button class="btn btn-add" style="flex:1;" id="saveNewRecordBtn">🚀 確認新增</button>
                <button class="btn btn-danger" style="flex:1;" id="closeAddRecordBtn">取消</button>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard_2.js"></script>

    <!-- 在檔案最下方 </body> 之前，補上起始總分的 Modal -->
    <!-- 📝 各隊起始總分 Modal -->
    <div class="modal-overlay" id="teamScoresModal">
        <div class="modal-content">
            <h2>📝 設定各隊起始總分</h2>
            <p style="font-size:0.9em; color:#ccc;">(設定的總分會與戰績排名分、讚數合併結算)</p>
            <div id="teamScoresContainer" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
            <div class="modal-btns">
                <button class="btn btn-base" style="flex:1;" id="saveTeamScoresBtn">💾 儲存總分</button>
                <button class="btn btn-danger" style="flex:1;" id="closeTeamScoresBtn">取消</button>
            </div>
        </div>
    </div>
</body>
</html>
